<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AFC Fried Chicken - Crispy, Juicy, Unstoppable. Taste the crunch that rules the town.">
    <meta name="keywords" content="fried chicken, restaurant, fast food, crispy chicken, AFC">
    <title>AFC Fried Chicken | Crispy & Juicy Chicken</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==================== CSS VARIABLES ==================== */
        :root {
            --primary-color: #C8102E;
            --secondary-color: #111111;
            --accent-color: #FFC72C;
            --background: #FFFFFF;
            --background-alt: #F8F8F8;
            --text-dark: #111111;
            --text-light: #666666;
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 8px 30px rgba(200, 16, 46, 0.2);
            --transition: all 0.3s ease;
            --border-radius: 12px;
        }

        /* ==================== RESET & BASE STYLES ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            line-height: 1.2;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        ul {
            list-style: none;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        button {
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: var(--transition);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-title h2 {
            font-size: 2.5rem;
            color: var(--secondary-color);
            margin-bottom: 10px;
        }

        .section-title p {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .section-padding {
            padding: 80px 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
        }

        .btn-primary {
            background: var(--primary-color);
            color: var(--white);
        }

        .btn-primary:hover {
            background: #a00d25;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(200, 16, 46, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--white);
            border: 2px solid var(--white);
        }

        .btn-secondary:hover {
            background: var(--white);
            color: var(--primary-color);
        }

        .btn-accent {
            background: var(--accent-color);
            color: var(--secondary-color);
        }

        .btn-accent:hover {
            background: #e6b329;
            transform: translateY(-2px);
        }

        /* ==================== NAVBAR ==================== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--white);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .navbar.scrolled {
            padding: 10px 0;
        }

        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
        }

        .logo i {
            font-size: 2rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links a {
            font-weight: 500;
            color: var(--secondary-color);
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-color);
            transition: var(--transition);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--background-alt);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary-color);
            font-size: 1.1rem;
            position: relative;
        }

        .nav-icon-btn:hover {
            background: var(--primary-color);
            color: var(--white);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--primary-color);
            color: var(--white);
            font-size: 0.7rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .mobile-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            padding: 5px;
        }

        .mobile-toggle span {
            width: 25px;
            height: 3px;
            background: var(--secondary-color);
            border-radius: 3px;
            transition: var(--transition);
        }

        /* ==================== HERO SECTION ==================== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            background: linear-gradient(135deg, var(--secondary-color) 0%, #2a2a2a 100%);
            overflow: hidden;
            padding-top: 80px;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="%23C8102E" opacity="0.1"/></svg>');
            background-size: 50px 50px;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50px); }
        }

        .hero .container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .hero-content h1 {
            font-size: 4rem;
            color: var(--white);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: -2px;
            animation: slideInLeft 0.8s ease;
        }

        .hero-content h1 span {
            color: var(--primary-color);
        }

        .hero-content p {
            font-size: 1.2rem;
            color: #cccccc;
            margin-bottom: 30px;
            animation: slideInLeft 0.8s ease 0.2s both;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
            animation: slideInLeft 0.8s ease 0.4s both;
        }

        .hero-image {
            position: relative;
            animation: slideInRight 0.8s ease;
        }

        .hero-image img {
            width: 100%;
            max-width: 500px;
            animation: bounce 3s ease-in-out infinite;
        }

        .hero-decoration {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: var(--primary-color);
            opacity: 0.1;
            z-index: -1;
        }

        .hero-decoration:nth-child(1) {
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
        }

        .hero-decoration:nth-child(2) {
            bottom: -100px;
            left: -100px;
            width: 250px;
            height: 250px;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* ==================== FEATURED ITEMS ==================== */
        .featured {
            background: var(--background-alt);
        }

        .featured-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .menu-card {
            background: var(--white);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-hover);
        }

        .menu-card-image {
            height: 200px;
            background: var(--background-alt);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .menu-card-image i {
            font-size: 4rem;
            color: var(--primary-color);
            opacity: 0.3;
        }

        .menu-card-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }

        .menu-card:hover .menu-card-image::before {
            left: 100%;
        }

        .menu-card-content {
            padding: 25px;
        }

        .menu-card-content h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--secondary-color);
        }

        .menu-card-content p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .menu-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .price span {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 400;
        }

        .add-to-cart {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--accent-color);
            color: var(--secondary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .add-to-cart:hover {
            background: var(--primary-color);
            color: var(--white);
            transform: scale(1.1);
        }

        /* ==================== ABOUT SECTION ==================== */
        .about {
            background: var(--white);
        }

        .about .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .about-image {
            position: relative;
        }

        .about-image-main {
            width: 100%;
            height: 400px;
            background: var(--background-alt);
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .about-image-main i {
            font-size: 8rem;
            color: var(--primary-color);
            opacity: 0.3;
        }

        .about-badge {
            position: absolute;
            bottom: -20px;
            right: -20px;
            background: var(--accent-color);
            padding: 20px;
            border-radius: var(--border-radius);
            text-align: center;
            box-shadow: var(--shadow);
        }

        .about-badge h3 {
            font-size: 2.5rem;
            color: var(--secondary-color);
        }

        .about-badge p {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .about-content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--secondary-color);
        }

        .about-content p {
            color: var(--text-light);
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .about-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .about-feature {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .about-feature i {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==================== OFFERS SECTION ==================== */
        .offers {
            background: var(--secondary-color);
            color: var(--white);
        }

        .offers .section-title h2 {
            color: var(--white);
        }

        .offers .section-title p {
            color: #cccccc;
        }

        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .offer-card {
            background: linear-gradient(135deg, var(--primary-color) 0%, #a00d25 100%);
            padding: 40px;
            border-radius: var(--border-radius);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .offer-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(200, 16, 46, 0.3);
        }

        .offer-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .offer-card h3 {
            font-size:
